name: Publish Skill To ClawHub

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview publish without uploading
        required: true
        default: true
        type: boolean
  release:
    types:
      - published

jobs:
  release-publish-disabled:
    if: github.event_name == 'release' && vars.CLAWHUB_PUBLISH_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip ClawHub publish
        run: echo "ClawHub release publishing is disabled. Set CLAWHUB_PUBLISH_ENABLED=true and CLAWHUB_TOKEN to enable it."

  publish-on-release:
    if: github.event_name == 'release' && vars.CLAWHUB_PUBLISH_ENABLED == 'true'
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@v1
    with:
      skill_path: .
      dry_run: false
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}

  publish-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@v1
    with:
      skill_path: .
      dry_run: ${{ inputs.dry_run }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
