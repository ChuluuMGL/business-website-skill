name: Publish Skill To ClawHub

# Publishes the skill to ClawHub. Three entry points:
#   - workflow_dispatch: manual; defaults to a dry-run preview.
#   - release (published): real release created by a human or a PAT.
#   - workflow_call: invoked by tag-on-bump.yml right after a new version tag
#     is created. This is the path that makes bump → publish automatic, because
#     a tag/release created with the default GITHUB_TOKEN does NOT emit the
#     `release: published` event that would otherwise trigger this workflow
#     (GitHub suppresses GITHUB_TOKEN-spawned events). A direct workflow_call
#     bypasses that suppression, so no PAT is required for auto-publish.

on:
  workflow_call:
    inputs:
      dry_run:
        description: Preview publish without uploading
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview publish without uploading
        required: true
        default: true
        type: boolean
  release:
    types:
      - published

jobs:
  # Non-blocking notice when publishing is off (skipped for manual dry-runs,
  # which are useful even without the token/enabled flag set).
  release-publish-disabled:
    if: vars.CLAWHUB_PUBLISH_ENABLED != 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - name: Skip ClawHub publish
        run: echo "ClawHub publishing is disabled. Set CLAWHUB_PUBLISH_ENABLED=true and CLAWHUB_TOKEN to enable it."

  dry-run:
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Read skill version
        id: version
        run: echo "version=$(python3 -c 'import json; print(json.load(open(\"skill.json\"))[\"version\"])')" >> "$GITHUB_OUTPUT"
      - name: ClawHub dry-run
        run: npm exec --yes --package clawhub -- clawhub skill publish "$PWD" --dry-run --version "${{ steps.version.outputs.version }}" --json

  publish:
    if: inputs.dry_run != true && vars.CLAWHUB_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Require ClawHub token
        run: test -n "$CLAWHUB_TOKEN"
      - name: Read skill version
        id: version
        run: echo "version=$(python3 -c 'import json; print(json.load(open(\"skill.json\"))[\"version\"])')" >> "$GITHUB_OUTPUT"
      - name: Login to ClawHub
        run: npm exec --yes --package clawhub -- clawhub login --token "$CLAWHUB_TOKEN"
      - name: Publish to ClawHub
        run: npm exec --yes --package clawhub -- clawhub skill publish "$PWD" --version "${{ steps.version.outputs.version }}" --json
